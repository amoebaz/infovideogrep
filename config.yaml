telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  offset_file: "./data/telegram_offset.txt"

whisper:
  model: "medium"
  device: "cpu"          # cpu | cuda
  compute_type: "int8"   # int8 (CPU) | float16 (GPU)

processing:
  # Skip videos longer than this (Whisper passes can be very slow on long content).
  # Set to null or remove to disable the guard.
  max_duration_seconds: 1800

llm:
  base_url: "https://openrouter.ai/api/v1"
  api_key: "${OPENROUTER_API_KEY}"
  model: "meta-llama/llama-3.3-70b-instruct:free"

llm_fallback:
  base_url: "http://localhost:11434/v1"
  api_key: ""
  model: "qwen2.5:3b"

categories:
  - {name: "Software",  icon: "🖥️"}
  - {name: "Serie",     icon: "📺"}
  - {name: "Película",  icon: "🎬"}
  - {name: "Música",    icon: "🎵"}
  - {name: "Libro",     icon: "📚"}
  - {name: "Lugar",     icon: "📍"}
  - {name: "Receta",    icon: "🍳"}
  - {name: "Otro",      icon: "📌"}

markdown:
  inbox_path: "${MARKDOWN_INBOX_PATH}"
